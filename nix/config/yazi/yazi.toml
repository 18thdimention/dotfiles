# yazi.toml
[mgr]
show_hidden = true

[preview]
cache_dir = "~/.cache/yazi"

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" }
]

[open]
rules = [
    { mime = "text/*", use = "edit" }
]

[plugin]
prepend_previewers = [
  { mime = "image/*", run = "noop" },
  { mime = "image/{avif,hei?,jxl}", run = "noop" }
]
prepend_preloaders = [
  { mime = "image/*", run = "noop" },
  { mime = "image/{avif,hei?,jxl}", run = "noop" }
]

