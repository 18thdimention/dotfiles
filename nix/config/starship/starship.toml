add_newline = true
continuation_prompt = "[‚Ėł‚ĖĻ ](dimmed white)"

# Show directory and language version above the prompt
# format = "[$directory$git_branch$git_status]($style)$character"
format = """
$directory
$git_branch
&gitstatus
$character
"""

# Only show time on the right, flush with the edge
right_format = """
$time
"""

[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[‚Üí](bold green)"
error_symbol = "[‚Üí](bold red)"
vimcmd_symbol = "[‚Üí](bold green)"
vimcmd_replace_one_symbol = "‚óĆ"
vimcmd_replace_symbol = "‚Ė°"
vimcmd_visual_symbol = "‚Ėľ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic mauve"
symbol = "‚čą‚Ēą"
disabled = false

[username]
style_user = "blue bold"
style_root = "red bold"
format = "[$user](blue bold) "
disabled = false
show_always = true

[directory]
home_symbol = "‚Ćā"
truncation_length = 2
truncation_symbol = "‚Ė° "
read_only = " ‚óą"
use_os_path_sep = true
style = "blue"
format = '[$path]($style)[$read_only]($read_only_style)'

[nodejs]
format = " via [Óúė $version](bold green)"
version_format = "${raw}"
symbol = ""
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " via [Óúľ $version](bold yellow)"
symbol = ""
version_format = "${raw}"

[rust]
format = " via [Óě® $version](bold peach)"
symbol = ""
version_format = "${raw}"

[lua]
format = " via [Óė† $version](bold blue)"
symbol = ""
version_format = "${raw}"

[deno]
format = " via [ūü¶ē $version](bold cyan)"
version_format = "${raw}"

[package]
format = " [pkg $version](yellow italic bold)"
version_format = "${raw}"
symbol = ""

[cmd_duration]
format = "[‚óĄ $duration ](italic overlay0)"

[jobs]
format = "[$symbol$number]($style) "
style = "text"
symbol = "[‚Ė∂](blue italic)"

[localip]
ssh_only = true
format = " ‚óĮ[$localipv4](bold mauve)"
disabled = false

[time]
disabled = false
format = "[ $time](overlay0)"
time_format = "%R"
utc_time_offset = "local"
style = "overlay0"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "‚Ėą"
charging_symbol = "[‚ÜĎ](italic bold green)"
discharging_symbol = "‚Üď"
unknown_symbol = "‚ĖĎ"
empty_symbol = "‚ĖÉ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic mauve"

[[battery.display]]
threshold = 70
style = "italic yellow"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[‚Ė≥](bold italic blue)"
style = "italic red"
truncation_symbol = "‚čĮ"
truncation_length = 11
# ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([‚Ėī$added]($added_style))([‚ĖŅ$deleted]($deleted_style))'
added_style = 'italic green'
deleted_style = 'italic red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic blue"
format = "([‚é™$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed‚é•]($style))"
conflicted = "[‚ó™‚ó¶](italic mauve)"
ahead = "[‚Ėī‚Ēā[${count}](bold text)‚Ēā](italic green)"
behind = "[‚ĖŅ‚Ēā[${count}](bold text)‚Ēā](italic red)"
diverged = "[‚óá ‚Ėī‚Ē§[${ahead_count}](text)‚Ēā‚ĖŅ‚Ē§[${behind_count}](text)‚Ēā](italic mauve)"
untracked = "[‚óĆ‚ó¶](italic yellow)"
stashed = "[‚óÉ‚óą](italic text)"
modified = "[‚óŹ‚ó¶](italic peach)"
staged = "[‚Ė™‚Ē§[$count](bold text)‚Ēā](italic teal)"
renamed = "[‚óé‚ó¶](italic blue)"
deleted = "[‚úē](italic red)"
