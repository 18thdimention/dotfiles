add_newline = true
continuation_prompt = "[в–ёв–№ ](dimmed white)"

# Show directory and language version above the prompt
# format = "[$directory$git_branch$git_status]($style)$character"
format = """
$directory
$git_branch
$git_status
$git_commit
$character
"""

# Only show time on the right, flush with the edge
right_format = """
$time
"""

[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[вҶ’](bold green)"
error_symbol = "[вҶ’](bold red)"
vimcmd_symbol = "[вҶ’](bold green)"
vimcmd_replace_one_symbol = "в—Ң"
vimcmd_replace_symbol = "в–Ў"
vimcmd_visual_symbol = "в–ј"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic mauve"
symbol = "вӢҲв”Ҳ"
disabled = false

[username]
style_user = "blue bold"
style_root = "red bold"
format = "[$user](blue bold) "
disabled = false
show_always = true

[directory]
home_symbol = "вҢӮ"
truncation_length = 2
truncation_symbol = "в–Ў "
read_only = " в—Ҳ"
use_os_path_sep = true
style = "blue"
format = '[$path]($style)[$read_only]($read_only_style)'

[nodejs]
format = " via [оңҳ $version](bold green)"
version_format = "${raw}"
symbol = ""
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " via [оңј $version](bold yellow)"
symbol = ""
version_format = "${raw}"

[rust]
format = " via [оһЁ $version](bold peach)"
symbol = ""
version_format = "${raw}"

[lua]
format = " via [оҳ  $version](bold blue)"
symbol = ""
version_format = "${raw}"

[deno]
format = " via [рҹҰ• $version](bold cyan)"
version_format = "${raw}"

[package]
format = " [pkg $version](yellow italic bold)"
version_format = "${raw}"
symbol = ""

[cmd_duration]
format = "[в—„ $duration ](italic overlay0)"

[jobs]
format = "[$symbol$number]($style) "
style = "text"
symbol = "[в–¶](blue italic)"

[localip]
ssh_only = true
format = " в—Ҝ[$localipv4](bold mauve)"
disabled = false

[time]
disabled = false
format = "[ $time](overlay0)"
time_format = "%R"
utc_time_offset = "local"
style = "overlay0"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "в–Ҳ"
charging_symbol = "[вҶ‘](italic bold green)"
discharging_symbol = "вҶ“"
unknown_symbol = "в–‘"
empty_symbol = "в–ғ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic mauve"

[[battery.display]]
threshold = 70
style = "italic yellow"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[в–і](bold italic blue)"
style = "italic red"
truncation_symbol = "вӢҜ"
truncation_length = 11
# ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([в–ҙ$added]($added_style))([в–ҝ$deleted]($deleted_style))'
added_style = 'italic green'
deleted_style = 'italic red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic blue"
format = "([вҺӘ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedвҺҘ]($style))"
conflicted = "[в—Әв—Ұ](italic mauve)"
ahead = "[в–ҙв”Ӯ[${count}](bold text)в”Ӯ](italic green)"
behind = "[в–ҝв”Ӯ[${count}](bold text)в”Ӯ](italic red)"
diverged = "[в—Ү в–ҙв”Ө[${ahead_count}](text)в”Ӯв–ҝв”Ө[${behind_count}](text)в”Ӯ](italic mauve)"
untracked = "[в—Ңв—Ұ](italic yellow)"
stashed = "[в—ғв—Ҳ](italic text)"
modified = "[в—Ҹв—Ұ](italic peach)"
staged = "[в–Әв”Ө[$count](bold text)в”Ӯ](italic teal)"
renamed = "[в—Һв—Ұ](italic blue)"
deleted = "[вң•](italic red)"


[git_commit]
disabled = false
only_detached = false
format = ' [п’¶ $hash](fg:color_pink)'
commit_hash_length = 6
tag_disabled = false
